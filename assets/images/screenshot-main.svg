<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.1)"/>
    </filter>
  </defs>
  
  <!-- Browser Window -->
  <rect width="800" height="600" rx="12" ry="12" fill="url(#screenGradient)" filter="url(#shadow)"/>
  
  <!-- Browser Header -->
  <rect width="800" height="60" rx="12" ry="12" fill="url(#headerGradient)"/>
  <rect y="60" width="800" height="12" fill="url(#headerGradient)"/>
  
  <!-- Browser Controls -->
  <circle cx="30" cy="30" r="8" fill="#ff5f57"/>
  <circle cx="60" cy="30" r="8" fill="#ffbd2e"/>
  <circle cx="90" cy="30" r="8" fill="#28ca42"/>
  
  <!-- URL Bar -->
  <rect x="140" y="20" width="500" height="20" rx="10" ry="10" fill="rgba(255,255,255,0.2)"/>
  <text x="150" y="32" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">agile.bastalab.fr</text>
  
  <!-- Navigation -->
  <rect x="20" y="80" width="760" height="50" fill="rgba(255,255,255,0.9)"/>
  <text x="40" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">🚀 Agile Coach Toolkit</text>
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">✨ Fonctionnalités</text>
  <text x="600" y="115" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">🛠️ Outils</text>
  
  <!-- Hero Section -->
  <rect x="20" y="150" width="760" height="200" fill="rgba(59,130,246,0.1)" rx="8" ry="8"/>
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1f2937" text-anchor="middle">Collection d'outils agiles</text>
  <text x="400" y="230" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle">Optimisez vos pratiques agiles et améliorez la collaboration</text>
  
  <!-- Badges -->
  <rect x="300" y="250" width="80" height="25" rx="12" ry="12" fill="#10b981" opacity="0.8"/>
  <text x="340" y="265" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">✅ Stable</text>
  
  <rect x="390" y="250" width="80" height="25" rx="12" ry="12" fill="#3b82f6" opacity="0.8"/>
  <text x="430" y="265" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">📱 PWA</text>
  
  <!-- Buttons -->
  <rect x="320" y="290" width="120" height="35" rx="8" ry="8" fill="#3b82f6"/>
  <text x="380" y="310" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🛠️ Découvrir</text>
  
  <rect x="460" y="290" width="120" height="35" rx="8" ry="8" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="520" y="310" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle">🚀 Installer</text>
  
  <!-- Tools Grid -->
  <rect x="40" y="380" width="220" height="180" fill="white" rx="8" ry="8" filter="url(#shadow)"/>
  <rect x="40" y="380" width="220" height="4" fill="#10b981" rx="2" ry="2"/>
  <text x="60" y="410" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">🗺️ Example Mapping</text>
  <text x="60" y="430" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Exploration collaborative</text>
  <rect x="60" y="450" width="60" height="20" rx="10" ry="10" fill="#10b981" opacity="0.2"/>
  <text x="90" y="462" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Stable</text>
  
  <rect x="290" y="380" width="220" height="180" fill="white" rx="8" ry="8" filter="url(#shadow)"/>
  <rect x="290" y="380" width="220" height="4" fill="#3b82f6" rx="2" ry="2"/>
  <text x="310" y="410" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">🎲 Planning Poker</text>
  <text x="310" y="430" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Estimation collaborative</text>
  <rect x="310" y="450" width="60" height="20" rx="10" ry="10" fill="#3b82f6" opacity="0.2"/>
  <text x="340" y="462" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">Stable</text>
  
  <rect x="540" y="380" width="220" height="180" fill="white" rx="8" ry="8" filter="url(#shadow)"/>
  <rect x="540" y="380" width="220" height="4" fill="#8b5cf6" rx="2" ry="2"/>
  <text x="560" y="410" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1f2937">📊 Agile Fluency</text>
  <text x="560" y="430" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Diagnostic de maturité</text>
  <rect x="560" y="450" width="60" height="20" rx="10" ry="10" fill="#f59e0b" opacity="0.2"/>
  <text x="590" y="462" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Bêta</text>
  
  <!-- Decorative Elements -->
  <circle cx="700" cy="200" r="30" fill="rgba(59,130,246,0.1)"/>
  <text x="700" y="208" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">🚀</text>
  
  <circle cx="120" cy="500" r="20" fill="rgba(16,185,129,0.1)"/>
  <text x="120" y="506" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">✨</text>
  
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.5"/>
</svg>